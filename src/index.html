<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparação de Algoritmos - Busca em Strings</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <header>
    <h1>Comparação de Algoritmos de Busca em Strings</h1>
  </header>

  <main class="container">

    <!-- PAINEL DE CONTROLE -->
    <section class="card">
      <h2>Configuração</h2>

      <label>Upload</label>
      <div class="upload-container">
        <input type="file" id="uploadTxt" name="myFiles" accept=".txt" multiple class="hidden-input">

        <label for="uploadTxt" class="upload-button">
          <span>📁 Carregar arquivos .txt</span>
        </label>

        <textarea name="content" id="textInput" placeholder="Digite aqui..."></textarea>
      </div>

      <br>
      <label>String de Busca (Pattern)</label>
      <input type="text" id="patternInput" placeholder="Digite a string de busca (pattern).">

      <br>
      <label>Algoritmo</label>
      <select id="algorithmSelect">
        <option value="naive">Naive</option>
        <option value="kmp">KMP</option>
        <option value="rabin-karp">Rabin-Karp</option>
        <option value="boyer-moore">Boyer-Moore</option>
      </select>

      <button id="runBtn">Executar</button>
      <button id="stepBtn">Passo a passo</button>
      <button id="nextStepBtn">Próximo passo</button>

    </section>

    <!-- RESULTADOS -->
    <section class="results">

      <!-- MÉTRICAS -->
      <div class="card metrics">
        <h2>Métricas</h2>
        <p><strong>Tempo:</strong> <span id="time">-</span></p>
        <p><strong>Comparações:</strong> <span id="comparisons">-</span></p>
        <p><strong>Tamanho do texto:</strong> <span id="textSize">-</span></p>
        <p><strong>Tamanho do padrão:</strong> <span id="patternSize">-</span></p>
        <p><strong>Complexidade:</strong> <span id="complexity">-</span></p>
      </div>

      <!-- VISUALIZAÇÃO -->
      <div class="card">
        <h2>Visualização</h2>

        <div id="textDisplay"></div>

        <h3>Log</h3>
        <div id="visualization"></div>
      </div>
    </section>

  </main>

  <script type="module" src="./js/ui.js"></script>
</body>
</html>
